<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}quant-bench{% endblock %}</title>
  <style>
    :root {
      --bg:        #ffffff;
      --surface:   #fafafa;
      --surface-2: #f4f4f5;
      --fg:        #0b0c0e;
      --fg-soft:   #3f434b;
      --muted:     #71767f;
      --faint:     #9aa0a8;
      --border:    #ececef;
      --border-2:  #e2e2e6;
      --accent:    #0e9f6e;
      --accent-fg: #ffffff;
      --accent-soft:#e4f6ee;
      --good:      #06764e;
      --good-bg:   #e3f5ec;
      --bad:       #c2334d;
      --bad-bg:    #fbe9ec;
      --row-hover: #f6faf7;
      --baseline:  #eef8f2;
      --shadow:    0 1px 2px rgba(9,10,14,.05), 0 1px 3px rgba(9,10,14,.04);
      --shadow-lg: 0 4px 24px rgba(9,10,14,.08);
      /* green heatmap wash + improvement bar */
      --heat-green: #0fa068;   /* mixed toward transparent per-cell by intensity */
      --bar-track:  #eef0ee;
      --bar-fill:   #12a56d;
      /* precision badges are neutral; the dot is graded green so the most
         compressed precision (int4) reads as the "greenest" at a glance */
      --dot-fp16: #c4cdc7;
      --dot-int8: #5cc79a;
      --dot-int4: #12a56d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #0c0d10;
        --surface:   #131418;
        --surface-2: #17191e;
        --fg:        #f2f3f5;
        --fg-soft:   #d3d6db;
        --muted:     #9096a0;
        --faint:     #6b7178;
        --border:    #22242a;
        --border-2:  #2b2e35;
        --accent:    #34d399;
        --accent-fg: #052015;
        --accent-soft:#0f2a20;
        --good:      #34d399;
        --good-bg:   #0f2a20;
        --bad:       #ff8397;
        --bad-bg:    #2a141a;
        --row-hover: #141916;
        --baseline:  #10231b;
        --shadow:    0 1px 2px rgba(0,0,0,.4);
        --shadow-lg: 0 8px 30px rgba(0,0,0,.5);
        --heat-green: #37c98a;
        --bar-track:  #21252b;
        --bar-fill:   #2fbb84;
        --dot-fp16: #4a5450;
        --dot-int8: #2f8f64;
        --dot-int4: #34d399;
      }
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--fg); background: var(--bg); margin: 0;
      line-height: 1.55; font-size: 15px;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::selection { background: var(--accent-soft); }

    /* ---------- top bar ---------- */
    .topbar {
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: saturate(180%) blur(10px);
    }
    .topbar-inner {
      max-width: 1120px; margin: 0 auto; padding: .85rem 1.5rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .brand { display: flex; align-items: center; gap: .55rem; font-weight: 650;
             letter-spacing: -.01em; color: var(--fg); font-size: 1rem; }
    .brand:hover { text-decoration: none; }
    .brand .dot {
      width: 22px; height: 22px; border-radius: 7px; flex: none;
      background: linear-gradient(150deg, #34d399, #0e9f6e 70%, #0b7d54);
      box-shadow: var(--shadow);
    }
    .brand .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .topbar .spacer { flex: 1; }
    .topbar .navlink { color: var(--muted); font-size: .85rem; font-weight: 500; }
    .topbar .navlink:hover { color: var(--fg); text-decoration: none; }

    /* ---------- layout ---------- */
    .wrap { max-width: 1120px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
    .page-head { margin-bottom: 1.6rem; }
    h1 { margin: 0; font-size: 2.1rem; letter-spacing: -.025em; font-weight: 700;
         line-height: 1.1; }
    .sub { color: var(--muted); margin: .55rem 0 0; font-size: 1rem; max-width: 62ch; }
    .back { display: inline-flex; align-items: center; gap: .3rem; font-size: .85rem;
            color: var(--muted); margin-bottom: 1rem; font-weight: 500; }
    .back:hover { color: var(--fg); text-decoration: none; }
    .muted { color: var(--muted); }
    .mono  { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    /* ---------- request bar (non-functional) ---------- */
    .request {
      display: flex; align-items: center; gap: .5rem;
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: 12px; padding: .5rem .5rem .5rem .95rem;
      margin: 1.4rem 0 2rem; box-shadow: var(--shadow); max-width: 640px;
    }
    .request svg { flex: none; color: var(--faint); }
    .request input {
      flex: 1; border: 0; background: transparent; color: var(--fg);
      font-size: .95rem; padding: .45rem 0; outline: none; font-family: inherit;
    }
    .request input::placeholder { color: var(--faint); }
    .request .btn {
      border: 0; background: var(--accent); color: var(--accent-fg);
      font-weight: 600; font-size: .85rem; padding: .55rem 1rem; border-radius: 8px;
      cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .request .btn:hover { filter: brightness(1.05); }
    .request .soon {
      font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
      color: var(--muted); background: var(--surface-2); border: 1px solid var(--border-2);
      padding: .2rem .45rem; border-radius: 6px; white-space: nowrap;
    }
    .request { flex-wrap: wrap; }
    .request .req-email {
      flex: 0 1 15ch; min-width: 12ch; border-left: 1px solid var(--border-2);
      padding-left: .7rem;
    }
    .request-note { margin: -1.2rem 0 2rem; font-size: .82rem; max-width: 640px; }

    /* flash messages (request accepted / rejected) */
    .flash {
      max-width: 640px; margin: 1.4rem 0 -.4rem; padding: .6rem .9rem;
      border-radius: 10px; font-size: .9rem; border: 1px solid var(--border-2);
    }
    .flash-error { color: var(--bad); background: var(--bad-bg);
                   border-color: color-mix(in srgb, var(--bad) 25%, transparent); }
    .flash-success { color: var(--good); background: var(--good-bg);
                     border-color: color-mix(in srgb, var(--good) 25%, transparent); }

    /* ---------- request status page ---------- */
    .status-card {
      border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow);
      background: var(--bg); padding: 1.6rem 1.5rem; max-width: 640px; margin-top: 1rem;
    }
    .status-badge {
      display: inline-flex; align-items: center; gap: .4rem; font-size: .78rem;
      font-weight: 650; text-transform: uppercase; letter-spacing: .04em;
      padding: .22rem .6rem; border-radius: 999px; border: 1px solid var(--border-2);
      background: var(--surface-2); color: var(--fg-soft);
    }
    .status-badge .sdot { width: .5rem; height: .5rem; border-radius: 999px;
                          background: var(--muted); }
    .status-badge.running .sdot { background: var(--accent);
                                  animation: pulse 1.2s ease-in-out infinite; }
    .status-badge.done { background: var(--good-bg); color: var(--good);
                         border-color: color-mix(in srgb, var(--good) 25%, transparent); }
    .status-badge.done .sdot { background: var(--good); }
    .status-badge.failed, .status-badge.rejected {
      background: var(--bad-bg); color: var(--bad);
      border-color: color-mix(in srgb, var(--bad) 25%, transparent); }
    .status-badge.failed .sdot, .status-badge.rejected .sdot { background: var(--bad); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    .status-card h1 { font-size: 1.4rem; margin: .9rem 0 .3rem; }
    .status-card .repo { font-size: .85rem; color: var(--faint); }
    .status-card p { color: var(--muted); margin: .8rem 0 0; }
    .status-card .cta {
      display: inline-block; margin-top: 1.1rem; background: var(--accent);
      color: var(--accent-fg); font-weight: 600; font-size: .9rem;
      padding: .55rem 1.1rem; border-radius: 9px;
    }
    .status-card .cta:hover { filter: brightness(1.05); text-decoration: none; }

    /* ---------- tabs / pills ---------- */
    .tabs { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: 1.1rem; }
    .tab {
      appearance: none; border: 1px solid var(--border-2); background: var(--bg);
      color: var(--fg-soft); font-family: inherit; font-size: .85rem; font-weight: 600;
      padding: .45rem .85rem; border-radius: 999px; cursor: pointer; line-height: 1.2;
      display: inline-flex; align-items: baseline; gap: .45rem; transition: none;
    }
    .tab:hover { background: var(--surface); color: var(--fg); }
    .tab .cnt { font-size: .72rem; font-weight: 600; color: var(--faint); }
    .tab .lock { font-size: .68rem; font-weight: 600; text-transform: uppercase;
                 letter-spacing: .03em; color: var(--faint); }
    .tab.is-active {
      background: var(--accent); color: var(--accent-fg); border-color: var(--accent);
    }
    .tab.is-active .cnt { color: color-mix(in srgb, var(--accent-fg) 70%, transparent); }
    .tab:disabled { cursor: default; opacity: .72; }
    .tab:disabled:hover { background: var(--bg); color: var(--fg-soft); }

    /* ---------- panels ---------- */
    .panel { display: none; }
    .panel.is-active { display: block; }
    .panel-meta {
      display: flex; align-items: baseline; gap: .6rem; flex-wrap: wrap;
      margin: 0 0 .85rem; color: var(--muted); font-size: .85rem;
    }
    .panel-meta strong { color: var(--fg); font-weight: 600; }
    .dirflag {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .74rem; font-weight: 600; padding: .18rem .5rem; border-radius: 6px;
      background: var(--surface-2); border: 1px solid var(--border-2); color: var(--fg-soft);
    }

    /* ---------- table ---------- */
    .table-card {
      border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
      box-shadow: var(--shadow); background: var(--bg);
    }
    .table-scroll { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%;
            font-variant-numeric: tabular-nums; font-size: .92rem; }
    thead th {
      position: sticky; top: 0; background: var(--surface);
      text-align: right; padding: .7rem .9rem; white-space: nowrap;
      font-size: .72rem; font-weight: 650; letter-spacing: .04em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border-2);
    }
    thead th .caret { color: var(--faint); font-size: .7em; margin-left: .25rem; }
    th.col-primary { color: var(--fg-soft); }
    th:first-child, td:first-child { text-align: left; }
    tbody td { padding: .72rem .9rem; text-align: right; white-space: nowrap;
               border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover td { background: var(--row-hover); }
    tbody tr.baseline td { background: var(--baseline); }
    tbody tr.baseline:hover td { background: var(--baseline); }

    /* rank cell */
    td.rank { text-align: center; width: 3.2rem; color: var(--muted); font-weight: 600; }
    .medal {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.55rem; height: 1.55rem; border-radius: 999px; font-size: .8rem;
      font-weight: 700; color: #4a3a06;
    }
    .medal.m1 { background: linear-gradient(160deg,#ffe9a8,#f6c344); }
    .medal.m2 { background: linear-gradient(160deg,#eef1f4,#c7ccd4); color:#3a3f47; }
    .medal.m3 { background: linear-gradient(160deg,#f6d5b3,#dd9b64); color:#4a2f13; }

    /* model cell */
    td.model .name { font-weight: 600; color: var(--fg); letter-spacing: -.005em; }
    td.model .repo { font-size: .76rem; color: var(--faint); }
    td.model .repo:hover { color: var(--accent); text-decoration: none; }

    /* score cell */
    td.score { font-weight: 700; font-size: 1.02rem; color: var(--fg);
               font-feature-settings: "tnum"; }
    td.score .unit { font-weight: 600; font-size: .78em; color: var(--muted); margin-left: .05rem; }
    td.metric { color: var(--fg-soft); }

    /* precision badge */
    .prec {
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .74rem; font-weight: 650; padding: .16rem .55rem .16rem .45rem; border-radius: 7px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: -.01em;
      color: var(--fg-soft); background: var(--surface-2); border: 1px solid var(--border-2);
    }
    .prec::before { content:""; width:.5rem; height:.5rem; border-radius:2px; background: var(--dot-fp16); }
    .prec-int8::before { background: var(--dot-int8); }
    .prec-int4::before { background: var(--dot-int4); }

    /* delta chips */
    .delta { font-size: .78rem; font-weight: 600; margin-left: .45rem;
             padding: .08rem .38rem; border-radius: 6px; }
    .delta.good { color: var(--good); background: var(--good-bg); }
    .delta.bad  { color: var(--bad);  background: var(--bad-bg); }
    .tag {
      display:inline-block; font-size:.66rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.04em; padding:.12rem .4rem; border-radius:5px; margin-left:.4rem;
      background: var(--accent-soft); color: var(--accent); vertical-align: middle;
    }

    /* ---------- improvement bar (memory saved) ---------- */
    td.improve { min-width: 172px; }
    .barcell { display: flex; align-items: center; gap: .6rem; justify-content: flex-end; }
    .bartrack {
      position: relative; flex: 1; max-width: 104px; height: 8px;
      background: var(--bar-track); border-radius: 999px; overflow: hidden;
    }
    .barfill {
      position: absolute; left: 0; top: 0; bottom: 0; min-width: 3px;
      background: var(--bar-fill); border-radius: 999px;
    }
    .barval { font-weight: 700; font-size: .82rem; white-space: nowrap;
              min-width: 3.5rem; text-align: right; color: var(--good); }
    .tri { font-size: .72em; }
    .basepill {
      font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
      color: var(--muted); background: var(--surface-2); border: 1px solid var(--border-2);
      padding: .12rem .45rem; border-radius: 6px;
    }

    /* ---------- speed chip ---------- */
    .chip {
      display: inline-flex; align-items: baseline; gap: .22rem;
      font-weight: 700; font-size: .82rem; padding: .1rem .42rem; border-radius: 6px;
    }
    .chip.up   { color: var(--good); background: var(--good-bg); }
    .chip.down { color: var(--bad);  background: var(--bad-bg); }
    .subraw { display: block; font-size: .72rem; color: var(--faint);
              font-weight: 500; margin-top: .12rem; }

    /* ---------- aligned value + delta cell ----------
       Splits a cell into a right-aligned NUMBER slot and a fixed-width DELTA
       slot, so the number sits on the same vertical line in a column whether or
       not a delta chip / % / speedup accompanies it (a missing chip leaves the
       slot empty instead of shifting the number). */
    .valcell {
      display: inline-grid; width: 100%;
      grid-template-columns: 1fr var(--slot, 4rem);
      align-items: baseline; column-gap: .4rem;
    }
    .valcell > .v { text-align: right; white-space: nowrap; }
    .valcell > .d { text-align: left; white-space: nowrap; min-width: 0; }
    .valcell.mem, .valcell.spd { --slot: 3.6rem; }

    /* ---------- model section (unified leaderboard) ---------- */
    .model-section { margin-top: 2.1rem; }
    .model-section:first-of-type { margin-top: 1rem; }
    .model-head { display: flex; align-items: baseline; gap: .55rem;
                  flex-wrap: wrap; margin: 0 0 .7rem; }
    .model-head h2 { margin: 0; font-size: 1.15rem; letter-spacing: -.02em;
                     font-weight: 650; }
    .model-head .repo { font-size: .8rem; color: var(--faint); }
    .model-head .repo:hover { color: var(--accent); text-decoration: none; }
    .model-head .spacer { flex: 1; }
    .gpu {
      display: inline-flex; align-items: center; gap: .32rem;
      font-size: .72rem; font-weight: 600; padding: .16rem .5rem; border-radius: 6px;
      background: var(--surface-2); border: 1px solid var(--border-2); color: var(--fg-soft);
    }
    .gpu .gpudot { width: .5rem; height: .5rem; border-radius: 999px; background: var(--accent); }
    .tag.reported { background: var(--surface-2); color: var(--muted); }
    th.col-task .caret { color: var(--faint); font-size: .7em; margin-left: .2rem; }
    th.col-task .th-metric { display: block; font-size: .92em; font-weight: 600;
                             color: var(--faint); text-transform: none; letter-spacing: 0; }

    /* empty / coming-soon state */
    .empty {
      border: 1px dashed var(--border-2); border-radius: 14px; background: var(--surface);
      padding: 2.6rem 1.5rem; text-align: center; color: var(--muted);
    }
    .empty h3 { margin: 0 0 .35rem; color: var(--fg); font-size: 1.05rem; }
    .empty p { margin: 0; font-size: .9rem; }

    .footnote { margin-top: 1rem; font-size: .8rem; color: var(--faint); }

    /* per-model page section headers */
    .task-block { margin-top: 2.2rem; }
    .task-block:first-of-type { margin-top: 1.4rem; }
    .task-title { display: flex; align-items: baseline; gap: .6rem; flex-wrap: wrap;
                  margin: 0 0 .2rem; }
    .task-title h2 { margin: 0; font-size: 1.25rem; letter-spacing: -.02em; font-weight: 650;
                     text-transform: capitalize; }

    @media (max-width: 640px) {
      .wrap { padding: 1.6rem 1rem 4rem; }
      h1 { font-size: 1.7rem; }
      td.model .repo { display: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="dot"></span><span>quant<span class="mono">·</span>bench</span>
      </a>
      <span class="spacer"></span>
      <a class="navlink" href="{{ url_for('index') }}">Leaderboard</a>
    </div>
  </div>
  <div class="wrap">{% block body %}{% endblock %}</div>
</body>
</html>
